<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1120" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Advance Precatórios" />
    <meta name="language" content="Portuguese" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Default meta description (rendered before React hydration) -->
    <meta name="description" content="A Advance Precatórios é líder em antecipação de precatórios federais. Receba seu crédito à vista com segurança, transparência e as melhores taxas do mercado. Análise gratuita!" />

    <!-- Preconnects críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch para recursos externos -->
    <link rel="dns-prefetch" href="https://ui-avatars.com" />

    <!-- Preload de assets críticos -->
    <link rel="preload" as="image" href="/assets/logo_advance.svg" type="image/svg+xml" fetchpriority="low" />
    <link rel="preload" as="image" href="/assets/logo_advance(branco).svg" type="image/svg+xml" fetchpriority="low" />

    <!-- Preload da imagem LCP (hero) com alta prioridade -->
    <link rel="preload" as="image" href="/assets/foto_hero(site).webp" fetchpriority="high" />

    <!-- Google Fonts - não bloqueante -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>

    <!-- Material Symbols - não bloqueante -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" /></noscript>

    <title>Advance Precatórios - Transformamos espera em oportunidade</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
